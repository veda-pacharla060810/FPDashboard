<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page Not Found — Future Physicians</title>
  <link rel="stylesheet" href="/css/global.css"/>
  <style>
    body { background: var(--navy); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .error-page { text-align: center; padding: 2rem; }
    .error-code { font-family: var(--font-display); font-size: 6rem; font-weight: 700; color: var(--teal); line-height: 1; margin-bottom: 1rem; }
    .error-title { font-size: 1.5rem; font-weight: 700; color: white; margin-bottom: 0.5rem; }
    .error-sub { color: rgba(255,255,255,0.45); margin-bottom: 2rem; }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-code">404</div>
    <div class="error-title">Page not found</div>
    <p class="error-sub">The page you're looking for doesn't exist or has been moved.</p>
    <a href="/pages/dashboard.html" class="btn btn-primary btn-lg">Go to dashboard</a>
  </div>
</body>
</html>
