<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Future Physicians</title>
  <link rel="stylesheet" href="css/global.css"/>
  <style>
    body { background: var(--navy); }
    .splash {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
    }
    .splash-icon {
      width: 72px;
      height: 72px;
      background: var(--teal);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .splash-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 700;
      color: white;
    }
    .splash-sub {
      font-size: 0.875rem;
      color: rgba(255,255,255,0.4);
    }
  </style>
</head>
<body>
  <div class="splash">
    <div class="splash-icon">
      <svg width="38" height="38" viewBox="0 0 24 24" fill="white">
        <path d="M12 2a10 10 0 100 20A10 10 0 0012 2zm1 14.5h-2v-4.5H8.5v-2H11V7h2v3h2.5v2H13v4.5z"/>
      </svg>
    </div>
    <div class="splash-title">Future Physicians</div>
    <div class="spinner" style="border-color:rgba(255,255,255,0.2);border-top-color:var(--teal);width:28px;height:28px;"></div>
    <div class="splash-sub">Redirecting…</div>
  </div>

  <script type="module">
    import { getSession, getProfile } from './js/supabase-client.js';

    async function redirect() {
      try {
        const session = await getSession();
        if (!session) {
          window.location.href = 'pages/login.html';
          return;
        }
        const profile = await getProfile(session.user.id);
        window.location.href = profile.role === 'admin'
          ? 'pages/admin-dashboard.html'
          : 'pages/dashboard.html';
      } catch {
        window.location.href = 'pages/login.html';
      }
    }

    redirect();
  </script>
</body>
</html>
