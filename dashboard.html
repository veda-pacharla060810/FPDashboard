<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Future Physicians</title>
  <link rel="stylesheet" href="../css/global.css"/>
</head>
<body>
  <div id="page-loader" class="page-loader">
    <div class="brand-icon" style="width:48px;height:48px;background:var(--teal);border-radius:12px;display:flex;align-items:center;justify-content:center;">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="white"><path d="M12 2a10 10 0 100 20A10 10 0 0012 2zm1 14.5h-2v-4.5H8.5v-2H11V7h2v3h2.5v2H13v4.5z"/></svg>
    </div>
    <span class="brand">Future Physicians</span>
  </div>

  <div class="app-shell" id="app-shell" style="display:none;">
    <div id="sidebar-mount"></div>

    <div class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button class="menu-toggle" id="menu-toggle" aria-label="Toggle menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <div>
            <div class="topbar-title" id="topbar-greeting">Welcome back!</div>
            <div class="topbar-subtitle" id="topbar-date"></div>
          </div>
        </div>
        <div class="topbar-right">
          <a href="profile.html" class="btn btn-outline btn-sm">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            My Profile
          </a>
        </div>
      </header>

      <main class="page-content">
        <!-- Stats row -->
        <div class="stats-grid" id="stats-grid">
          <div class="stat-card">
            <div class="stat-icon teal">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            </div>
            <div class="stat-info">
              <div class="stat-value" id="stat-hours">—</div>
              <div class="stat-label">Approved volunteer hours</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon amber">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            </div>
            <div class="stat-info">
              <div class="stat-value" id="stat-pending">—</div>
              <div class="stat-label">Pending submissions</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon navy">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            </div>
            <div class="stat-info">
              <div class="stat-value" id="stat-events">—</div>
              <div class="stat-label">Upcoming events</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon green">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
            </div>
            <div class="stat-info">
              <div class="stat-value" id="stat-attended">—</div>
              <div class="stat-label">Events attended</div>
            </div>
          </div>
        </div>

        <!-- Main content grid -->
        <div class="grid-2" style="margin-bottom: var(--space-6);">
          <!-- Upcoming Events -->
          <div class="card">
            <div class="card-header">
              <h3>Upcoming events</h3>
              <a href="events.html" class="btn btn-ghost btn-sm">View all</a>
            </div>
            <div id="events-list">
              <div style="padding: 2rem; text-align:center; color: var(--text-muted);">
                <div class="spinner dark" style="margin: 0 auto 1rem;"></div>
                Loading events…
              </div>
            </div>
          </div>

          <!-- Announcements -->
          <div class="card">
            <div class="card-header">
              <h3>Announcements</h3>
              <a href="announcements.html" class="btn btn-ghost btn-sm">View all</a>
            </div>
            <div class="card-body" id="announcements-list">
              <div style="text-align:center; color: var(--text-muted);">
                <div class="spinner dark" style="margin: 0 auto 1rem;"></div>
                Loading announcements…
              </div>
            </div>
          </div>
        </div>

        <!-- Hours summary -->
        <div class="card">
          <div class="card-header">
            <h3>Recent volunteer hours</h3>
            <a href="volunteer-hours.html" class="btn btn-primary btn-sm">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Log hours
            </a>
          </div>
          <div class="table-wrap" id="hours-table-wrap">
            <div style="padding: 2rem; text-align:center; color: var(--text-muted);">
              <div class="spinner dark" style="margin: 0 auto 1rem;"></div>
              Loading hours…
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script type="module">
    import { requireMember, signOut, getUpcomingEvents, getAnnouncements, getMyHours, getMyAttendance } from '../js/supabase-client.js';
    import { renderMemberSidebar } from '../js/sidebar.js';
    import { setupSidebar, setActiveNav, renderSidebarUser, hideLoader,
             formatDate, formatDateTime, getEventMonth, getEventDay,
             CATEGORY_BADGES, CATEGORY_LABELS, STATUS_BADGES,
             escHtml, timeAgo } from '../js/utils.js';

    async function init() {
      const { session, profile } = await requireMember();

      // Inject sidebar
      document.getElementById('sidebar-mount').innerHTML = renderMemberSidebar(profile);
      renderSidebarUser(profile);
      setActiveNav('dashboard');
      setupSidebar();
      document.getElementById('btn-signout').addEventListener('click', signOut);

      // Topbar
      const hour = new Date().getHours();
      const greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
      document.getElementById('topbar-greeting').textContent = `${greeting}, ${profile.full_name?.split(' ')[0] || 'member'}!`;
      document.getElementById('topbar-date').textContent = new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
      document.getElementById('menu-toggle').addEventListener('click', () => {
        document.querySelector('.sidebar').classList.toggle('open');
        document.querySelector('.sidebar-overlay').classList.toggle('open');
      });

      // Show app
      document.getElementById('app-shell').style.display = 'flex';
      hideLoader();

      // Load all data in parallel
      const [events, announcements, hours, attendance] = await Promise.all([
        getUpcomingEvents(5).catch(() => []),
        getAnnouncements(4).catch(() => []),
        getMyHours(session.user.id).catch(() => []),
        getMyAttendance(session.user.id).catch(() => [])
      ]);

      // Stats
      const approvedHours = hours.filter(h => h.status === 'approved').reduce((a, h) => a + Number(h.hours), 0);
      const pendingHours  = hours.filter(h => h.status === 'pending').length;
      document.getElementById('stat-hours').textContent    = approvedHours.toFixed(1);
      document.getElementById('stat-pending').textContent  = pendingHours;
      document.getElementById('stat-events').textContent   = events.length;
      document.getElementById('stat-attended').textContent = attendance.length;

      // Events list
      const eventsEl = document.getElementById('events-list');
      if (!events.length) {
        eventsEl.innerHTML = `<div class="empty-state"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div><h4>No upcoming events</h4><p>Check back soon for new events.</p></div>`;
      } else {
        eventsEl.innerHTML = events.map(ev => `
          <div style="display:flex;align-items:center;gap:1rem;padding:1rem 1.5rem;border-bottom:1px solid var(--gray-100);">
            <div class="event-date-badge">
              <div class="event-month">${getEventMonth(ev.event_date)}</div>
              <div class="event-day">${getEventDay(ev.event_date)}</div>
            </div>
            <div style="flex:1;min-width:0;">
              <div class="event-title" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml(ev.title)}</div>
              <div style="font-size:0.78rem;color:var(--text-muted);margin-top:2px;">${escHtml(ev.location || 'Location TBA')}</div>
            </div>
            <span class="badge ${CATEGORY_BADGES[ev.category] || 'badge-gray'}">${CATEGORY_LABELS[ev.category] || ev.category}</span>
          </div>
        `).join('');
      }

      // Announcements
      const annEl = document.getElementById('announcements-list');
      if (!announcements.length) {
        annEl.innerHTML = `<div class="empty-state"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/></svg></div><h4>No announcements</h4></div>`;
      } else {
        annEl.innerHTML = announcements.map(a => `
          <div class="announcement-item ${a.priority}">
            <div class="announcement-title">${escHtml(a.title)}</div>
            <div class="announcement-body">${escHtml(a.body.slice(0, 120))}${a.body.length > 120 ? '…' : ''}</div>
            <div class="announcement-meta">${timeAgo(a.created_at)}</div>
          </div>
        `).join('');
      }

      // Hours table
      const recentHours = hours.slice(0, 5);
      const tableWrap = document.getElementById('hours-table-wrap');
      if (!recentHours.length) {
        tableWrap.innerHTML = `<div class="empty-state"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><h4>No hours logged yet</h4><p>Submit your first volunteer hours using the button above.</p></div>`;
      } else {
        tableWrap.innerHTML = `
          <table class="table">
            <thead>
              <tr><th>Description</th><th>Date</th><th>Hours</th><th>Status</th></tr>
            </thead>
            <tbody>
              ${recentHours.map(h => `
                <tr>
                  <td>${escHtml(h.description)}</td>
                  <td>${formatDate(h.date_performed)}</td>
                  <td><strong>${Number(h.hours).toFixed(1)}</strong></td>
                  <td><span class="badge ${STATUS_BADGES[h.status] || 'badge-gray'}">${h.status}</span></td>
                </tr>
              `).join('')}
            </tbody>
          </table>`;
      }
    }

    init().catch(console.error);
  </script>
</body>
</html>
